<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        margin: 0 8px;
      }

      .send-button{
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;

        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;
      }
      .chat-message-robot{
        display: flex;
        align-items: start;
      }

      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        /* margin-right: 10px;
        margin-left: 10px; */
        margin: 0 10px 20px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 28px;
        overflow: scroll;
        scrollbar-width: none;
      }

      .welcome-message{
        color: gray;
        text-align: center;
      }

      .loading-image{
        height: 40px;
        margin: -15px;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('')
        const [isLoading, setIsLoading] = React.useState(false)

        function saveInputText(event) {
          setInputText(event.target.value)
        }
      
        function onKeyDown(event){
          event.key ==='Enter' && sendMessage()
          event.key ==='Escape' && setInputText('')
        }

        async function sendMessage() {
          if(isLoading || inputText===''){
            return
          }
          setIsLoading(true)
          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ]

          setChatMessages(newChatMessages)  
          
          setInputText('')

          setChatMessages([
            ...newChatMessages,
            {
              message: <img src="/images/loading-spinner.gif" alt="" className="loading-image"/>,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ])  
          
          const response = await Chatbot.getResponseAsync(inputText)
          setChatMessages([
            ...newChatMessages,
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ])  
          setIsLoading(false)
        }

        return (
          <div className='chat-input-container'>
            <input 
              placeholder='Send a Message to Chatbot' 
              size="30"
              onChange={saveInputText}
              onKeyDown={onKeyDown}
              value={inputText}
              className='chat-input'
            />
            <button 
              onClick={sendMessage}
              className='send-button'
            >Send</button>
          </div>
        )
      }

      function ChatMessage({ message, sender }) {
        // const message = props.message
        // const sender = props.sender
        // const { message, sender } = props        
        
        // if (sender === 'robot') {
        //   return(
        //     <div>
        //       <img src="/images/robot.png" width="50"/>
        //       {message}
        //     </div>
        //   )
        // }

        return (
          <div className={
            sender==='user' 
              ? 'chat-message-user' 
              : 'chat-message-robot'
          }>
            {sender === 'robot' && (
              <img src="/images/robot.png" 
              className='chat-message-profile'/>
            )}
            <div className='chat-message-text'>
              {message}
            </div>
            {sender === 'user' && (
              <img src="/images/user.png" className='chat-message-profile'/>
            )}
          </div>
        )
      }

      function useAutoScroll(dependencies) {
        const containerRef = React.useRef(null)
        
        React.useEffect(() => {
          const containerElem = containerRef.current
          if(containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight            
          }
        }, dependencies)
        return containerRef
      }
      
      function ChatMessages({ chatMessages }) {
        const chatMessagesRef = useAutoScroll([chatMessages])
        return (
          <div 
          className='chat-messages-container'
            ref={chatMessagesRef}>
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              )
            })}
          </div>
        )
      }

      function App() {
        const [ chatMessages, setChatMessages ] = React.useState([])
        // const [ chatMessages, setChatMessages ] = React.useState([{
        //   id: 'id1',
        //   message: 'hello chatbot',
        //   sender: 'user'
        // }, {
        //   id: 'id2',
        //   message:'hello! how can i help you?',
        //   sender: 'robot'
        // },{
        //   id: 'id3',
        //   message: 'can you help me with todays date?',
        //   sender: 'user'
        // }, {
        //   id: 'id4',
        //   message: 'sure! today date is January 3rd',
        //   sender: 'robot'
        // }])
        // const [ chatMessages, setChatMessages ] = array
        // const chatMessages = array[0]
        // const setChatMessages = array[1]

        return (
          <div className='app-container'>
            {chatMessages.length===0 && 
              <p className="welcome-message"
                >Welcome to chatbot project. Type a message in the textbox below
              </p>
            }
            <ChatMessages 
              chatMessages={chatMessages}
            />
            <ChatInput 
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        )
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container)
     root.render(<App />);
    </script>
  </body>
</html>
